name: PR Security

on:
  pull_request:
    branches: [main]

jobs:
  security-checks:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app dependencies
        run: |
          pip install -r apps/orders-service/requirements.txt
          pip install -r apps/inventory-service/requirements.txt

      - name: Run tests
        run: pytest apps/orders-service/tests apps/inventory-service/tests

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate kustomize build
        run: kubectl kustomize deploy/overlays/dev > /tmp/dev-manifest.yaml
